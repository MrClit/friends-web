<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Añadir Transacción - SplitEvent</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#059669',
              'brand-vibrant': '#10b981',
              'mint-light': '#f0fdfa',
              'mint-dark': '#064e3b',
              'background-light': '#ecfdf5',
              'background-dark': '#022c22',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '1rem',
            },
            screens: {
              xs: '400px',
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply text-slate-800 dark:text-emerald-50 transition-colors duration-300;
          background: radial-gradient(circle at top left, #f0fdfa, #ecfdf5);
          background-attachment: fixed;
        }
        .dark body {
          background: radial-gradient(circle at top left, #064e3b, #022c22);
          background-attachment: fixed;
        }
      }
      .glass-nav {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(16px);
      }
      .dark .glass-nav {
        background: rgba(2, 44, 34, 0.8);
      }
      .event-card {
        @apply bg-white dark:bg-emerald-950/60 border-slate-100 dark:border-emerald-800/50 shadow-sm transition-all duration-300;
      }
      .event-card:hover {
        transform: translateY(-4px);
        @apply shadow-xl shadow-emerald-900/10 border-emerald-200/50;
      }
      .modal-overlay {
        background-color: rgba(2, 44, 34, 0.4);
        backdrop-filter: blur(8px);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        @apply bg-transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        @apply bg-emerald-200 dark:bg-emerald-800 rounded-full;
      }
      .segmented-control {
        @apply flex p-1.5 bg-slate-100/80 dark:bg-emerald-900/40 rounded-2xl w-full max-w-md mx-auto;
      }
      .segmented-control-item {
        @apply flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-sm font-bold transition-all duration-300 relative overflow-hidden;
        flex: 1 1 0%;
      }
      @media (max-width: 640px) {
        .segmented-control-item:not(.active) {
          flex: 0 0 56px;
          @apply px-0;
        }
        .segmented-control-item.active {
          flex: 1 1 auto;
        }
        .segmented-control-item:not(.active) span:not(.material-symbols-outlined) {
          display: none;
        }
      }
      .segmented-control-item.active {
        @apply bg-brand-vibrant text-white shadow-lg shadow-brand-vibrant/20 ring-1 ring-white/10;
      }
      .segmented-control-item:not(.active) {
        @apply text-slate-500 dark:text-emerald-400 hover:text-brand-vibrant dark:hover:text-white hover:bg-white/50 dark:hover:bg-emerald-800/30;
      }
      select {
        background-image: none !important;
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">
    <nav class="sticky top-0 z-40 px-6 py-4 glass-nav border-b border-emerald-100 dark:border-emerald-800/50">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/30"
          >
            <span class="material-symbols-outlined font-bold">account_balance_wallet</span>
          </div>
          <h1 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">
            Split<span class="text-primary">Event</span>
          </h1>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
          <button
            class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-emerald-800 hover:bg-white dark:hover:bg-emerald-900/50 transition-all"
          >
            <span class="material-symbols-outlined text-[20px] text-emerald-600 dark:text-emerald-400">language</span>
            <span class="text-sm font-semibold hidden sm:inline">ES</span>
          </button>
          <button
            class="p-2 rounded-lg border border-slate-200 dark:border-emerald-800 hover:bg-white dark:hover:bg-emerald-900/50 transition-all"
            id="theme-toggle"
          >
            <span class="material-symbols-outlined dark:hidden text-emerald-600">dark_mode</span>
            <span class="material-symbols-outlined hidden dark:inline text-emerald-400">light_mode</span>
          </button>
          <div class="h-8 w-[1px] bg-emerald-100 dark:bg-emerald-800 mx-2"></div>
          <div class="relative group">
            <button
              class="flex items-center gap-3 p-1 pr-3 rounded-full hover:bg-white dark:hover:bg-emerald-900/50 transition-all border border-transparent hover:border-emerald-100 dark:hover:border-emerald-800"
            >
              <img
                alt="Avatar de Victor"
                class="w-8 h-8 rounded-full object-cover ring-2 ring-primary/20"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRK9-JBTOY4YzQ43lgVlSJetzF1e4Y3UZV-ToqkpWItDEbeB0ppkvjftScngCg3fxmuCOgV-gPZnThUEPESnVTU9o36Bk0AF7uIoFMcaGBMqP8iirI_dbtueOTb3SPLWPUfDQ34L_gOfTEgIZ2gEiafp1bWMcq3N_Hvoc6PRBcbmc2wtkmBPDqWWkoGZwvCW2FZLHaCqzi49IEhvq-1V9LGSozrgT9fUSt0PdCvnqms8OtXSqTt0rSIJQ9Y9E2_y6OSwqubFiXuZg"
              />
              <span class="text-sm font-bold hidden md:inline">Victor Sales</span>
              <span class="material-symbols-outlined text-slate-400 hidden md:inline text-[20px]">expand_more</span>
            </button>
          </div>
        </div>
      </div>
    </nav>
    <main class="flex-1 p-6 md:p-12">
      <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
          <div>
            <h2 class="text-4xl font-extrabold text-slate-900 dark:text-emerald-50 mb-3 tracking-tight">
              Cena en Barcelona
            </h2>
            <p class="text-emerald-800/60 dark:text-emerald-300/60 text-lg">
              Gestiona tus gastos compartidos de forma sencilla.
            </p>
          </div>
          <button
            class="bg-brand-vibrant hover:bg-emerald-600 text-white px-8 py-4 rounded-2xl flex items-center justify-center gap-3 font-bold shadow-xl shadow-brand-vibrant/25 transition-all active:scale-95 group"
          >
            <span class="material-symbols-outlined font-bold">add</span>
            Añadir Transacción
          </button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 opacity-20 pointer-events-none">
          <div class="group event-card p-7 rounded-3xl">
            <div class="flex justify-between items-start mb-6">
              <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-primary">
                <span class="material-symbols-outlined text-3xl">restaurant</span>
              </div>
            </div>
            <h3 class="text-2xl font-bold mb-2">mas gastos</h3>
            <p class="text-slate-500 text-sm mb-8 leading-relaxed">Pagado por Bob</p>
            <div class="mt-auto pt-6 border-t border-emerald-50 flex justify-between items-center">
              <span class="font-bold text-red-500">340,00 €</span>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
      <div
        class="bg-white dark:bg-emerald-950 w-full max-w-xl rounded-[2.5rem] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.15)] flex flex-col max-h-[95vh] sm:max-h-[90vh] border border-emerald-100 dark:border-emerald-800/50 overflow-hidden"
      >
        <div class="px-8 pt-8 pb-4 flex justify-between items-center">
          <h3 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Añadir Transacción</h3>
          <button
            class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-emerald-900/50 text-slate-400 transition-colors"
          >
            <span class="material-symbols-outlined text-[24px]">close</span>
          </button>
        </div>
        <div class="flex-1 overflow-y-auto px-6 sm:px-8 py-2 custom-scrollbar">
          <div class="space-y-8 pb-6">
            <div class="segmented-control">
              <button aria-label="Contribución" class="segmented-control-item active group" id="type-contribution">
                <span class="material-symbols-outlined text-[22px]">account_balance</span>
                <span>Contribución</span>
              </button>
              <button aria-label="Gasto" class="segmented-control-item group" id="type-expense">
                <span class="material-symbols-outlined text-[22px]">shopping_cart</span>
                <span>Gasto</span>
              </button>
              <button aria-label="Reembolso" class="segmented-control-item group" id="type-refund">
                <span class="material-symbols-outlined text-[22px]">sync</span>
                <span>Reembolso</span>
              </button>
            </div>
            <div class="grid gap-6">
              <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-700 dark:text-emerald-100 px-1">Título</label>
                <input
                  class="w-full px-5 py-4 rounded-2xl border border-slate-200 dark:border-emerald-800 bg-slate-50/50 dark:bg-emerald-900/30 focus:ring-2 focus:ring-brand-vibrant focus:border-transparent outline-none transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-emerald-700 font-medium"
                  placeholder="Ej. Cena en el puerto"
                  type="text"
                />
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div class="space-y-2">
                  <label class="block text-sm font-bold text-slate-700 dark:text-emerald-100 px-1">Importe</label>
                  <div class="relative">
                    <input
                      class="w-full pl-5 pr-12 py-4 rounded-2xl border border-slate-200 dark:border-emerald-800 bg-slate-50/50 dark:bg-emerald-900/30 focus:ring-2 focus:ring-brand-vibrant focus:border-transparent outline-none transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-emerald-700 font-medium"
                      placeholder="0,00"
                      type="number"
                    />
                    <span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400">€</span>
                  </div>
                </div>
                <div class="space-y-2">
                  <label class="block text-sm font-bold text-slate-700 dark:text-emerald-100 px-1">Fecha</label>
                  <div class="relative">
                    <input
                      class="w-full px-5 py-4 rounded-2xl border border-slate-200 dark:border-emerald-800 bg-slate-50/50 dark:bg-emerald-900/30 focus:ring-2 focus:ring-brand-vibrant focus:border-transparent outline-none transition-all dark:text-white font-medium"
                      type="date"
                      value="2026-02-08"
                    />
                  </div>
                </div>
              </div>
              <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-700 dark:text-emerald-100 px-1" id="participant-label"
                  >Recibido de</label
                >
                <div class="relative group">
                  <div
                    class="absolute left-5 top-1/2 -translate-y-1/2 flex items-center pointer-events-none transition-colors group-focus-within:text-brand-vibrant text-slate-400"
                  >
                    <span class="material-symbols-outlined text-[22px]">person</span>
                  </div>
                  <select
                    class="w-full pl-12 pr-12 py-4 rounded-2xl border border-slate-200 dark:border-emerald-800 bg-slate-50/50 dark:bg-emerald-900/30 focus:ring-2 focus:ring-brand-vibrant focus:border-transparent outline-none transition-all dark:text-white font-medium appearance-none cursor-pointer"
                  >
                    <option disabled="" selected="" value="">Selecciona un participante</option>
                    <option value="1">Victor Sales (Tú)</option>
                    <option value="2">Marta Sánchez</option>
                    <option value="3">Dani García</option>
                  </select>
                  <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                    <span class="material-symbols-outlined text-[20px]">keyboard_arrow_down</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div
          class="px-6 sm:px-8 py-6 bg-slate-50/50 dark:bg-emerald-900/20 flex flex-col-reverse sm:flex-row items-center justify-end gap-3 sm:gap-4 border-t border-emerald-100/50 dark:border-emerald-800/30"
        >
          <button
            class="w-full sm:w-auto px-6 py-3.5 rounded-2xl font-bold text-slate-500 dark:text-emerald-300 hover:bg-slate-200/50 dark:hover:bg-emerald-800/50 transition-colors"
          >
            Cancelar
          </button>
          <button
            class="w-full sm:w-auto bg-brand-vibrant hover:bg-emerald-600 text-white px-8 sm:px-12 py-3.5 rounded-2xl font-extrabold shadow-lg shadow-brand-vibrant/25 transition-all active:scale-95 flex items-center justify-center gap-2"
          >
            Guardar
          </button>
        </div>
      </div>
    </div>
    <script>
      // Theme Toggle Logic
      const themeToggle = document.getElementById('theme-toggle');
      const html = document.documentElement;
      themeToggle.addEventListener('click', () => {
        if (html.classList.contains('dark')) {
          html.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        } else {
          html.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        }
      });
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
      } else {
        html.classList.remove('dark');
      }
      // Tab selection and dynamic labels logic
      const tabs = document.querySelectorAll('.segmented-control-item');
      const participantLabel = document.getElementById('participant-label');
      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          tabs.forEach((t) => t.classList.remove('active'));
          tab.classList.add('active');
          // Update dynamic label based on selected transaction type
          if (tab.id === 'type-contribution') {
            participantLabel.textContent = 'Recibido de';
          } else {
            participantLabel.textContent = 'Pagado por';
          }
        });
      });
    </script>
  </body>
</html>
